        <!-- Button trigger modal -->
        <button type="button" class="btn btn-primary d-none" data-bs-toggle="modal"
            data-bs-target="#resultModal" id="show-modal">
            Launch demo modal
        </button>

        <!-- Modal -->
        <div class="modal fade" id="resultModal" tabindex="-1" aria-labelledby="resultModalLabel"
            aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="resultModalLabel">Resultado</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="success d-none" id="result-success">
                            PARABÉNS!
                            <br>
                            Você acertou uma das palavras do dia em
                            <span id="tries"></span> tentativa(s)!
                        </div>
                        <div class="failure d-none" id="result-failure">
                            NÃO FOI DESSA VEZ!
                            <br>
                            Infelizmente você não acertou a palavra. Tente novamente na próxima
                            palavra.
                        </div>
                        <div id="summary" class="mt-3"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"

                        <a class="btn btn-primary d-none"
